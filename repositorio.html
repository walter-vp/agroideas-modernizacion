<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio Institucional - AGROIDEAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <header></header>
    <section class="bg-dark text-white p-5 text-center mt-20">
        <h1>Repositorio Institucional</h1>
        <p>Activos de Conocimiento e Innovación</p>
    </section>
    <main class="container py-5">
        <!-- Contenido Simplificado para brevedad en esta herramienta -->
        <div class="card p-4 shadow-sm">
            <h5>Directivas Internas</h5>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Documento</th>
                        <th class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Directiva de Gestión de Modernización</td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger border-0">
                                <i class="bi bi-filetype-pdf" style="font-size: 1.4rem;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
